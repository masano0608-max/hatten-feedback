<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声添削フィードバックビルダー</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text2: #6b6760;
    --text3: #9e9b96;
    --green: #1a6b45;
    --green-bg: #e4f0ea;
    --purple: #4a3fb5;
    --purple-bg: #eeedf9;
    --blue: #1a5fa8;
    --blue-bg: #e4eef9;
    --amber: #7a4d0a;
    --amber-bg: #faecd8;
    --coral: #8a3318;
    --coral-bg: #faece4;
    --teal-bg: #e1f0ee;
    --teal: #0d6b52;
    --accent: #1a6b45;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-left h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .progress-dots {
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s;
  }
  .dot.done { background: var(--green); }
  .dot.partial { background: #e0a830; }
  .btn-reset {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
  }
  .btn-reset:hover { background: var(--surface2); }
  .search-wrap {
    padding: 12px 0 6px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .coach-select {
    padding: 5px 8px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    min-width: 110px;
  }
  .coach-select:focus { outline: none; border-color: var(--accent); }
  .coach-warn {
    font-size: 11px;
    color: #c0392b;
    margin-top: 2px;
    display: none;
  }
  .coach-warn.show { display: block; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    min-height: calc(100vh - 64px);
  }
  .left-col {
    padding: 20px 20px 40px;
    overflow-y: auto;
  }
  .right-col {
    border-left: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
  }

  /* Sections */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .sec-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: background 0.15s;
  }
  .sec-header:hover { background: var(--surface2); }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .b-open { background: var(--green-bg); color: var(--green); }
  .b-growth { background: var(--purple-bg); color: var(--purple); }
  .b-sound { background: var(--blue-bg); color: var(--blue); }
  .b-advice { background: var(--amber-bg); color: var(--amber); }
  .b-ltv { background: var(--coral-bg); color: var(--coral); }
  .b-close { background: var(--teal-bg); color: var(--teal); }
  .sec-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .sec-counter { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .sec-counter.ok { color: var(--green); font-weight: 600; }
  .sec-counter.warn { color: #b07a10; font-weight: 600; }
  .chevron {
    font-size: 10px;
    color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .section.open .chevron { transform: rotate(90deg); }
  .sec-body {
    display: none;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: #fcfbf9;
  }
  .section.open .sec-body { display: block; }

  /* Filters */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 11px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    cursor: pointer;
    color: var(--text2);
    background: transparent;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tag:hover { background: var(--surface2); }
  .tag.active { background: var(--text); color: white; border-color: var(--text); }

  .multi-hint {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 8px;
  }

  /* Template cards */
  .templates { display: flex; flex-direction: column; gap: 6px; }
  .tpl-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    background: white;
    transition: border-color 0.15s, background 0.15s;
  }
  .tpl-card:hover { border-color: var(--border2); }
  .tpl-card.selected {
    border-color: var(--accent);
    background: var(--green-bg);
  }
  .tpl-text { font-size: 13px; color: var(--text); line-height: 1.65; margin-bottom: 4px; }
  .tpl-memo { font-size: 11px; color: var(--text3); }
  .tpl-card.selected .tpl-text { color: var(--green); }

  /* Preview panel */
  .prev-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .prev-head-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .prev-head-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .btn-copy {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--text);
    color: white;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .btn-copy:hover { opacity: 0.85; }
  .btn-copy:disabled { opacity: 0.4; cursor: default; }
  .prev-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
  }
  .prev-empty { color: var(--text3); font-style: italic; font-size: 13px; line-height: 1.7; }
  .prev-section {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--border);
  }
  .prev-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .prev-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text3);
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .prev-section-text { font-size: 13px; line-height: 1.75; color: var(--text); }
  .prev-section-text + .prev-section-text { margin-top: 8px; }

  .edit-area-wrap {
    border-top: 1px solid var(--border);
    padding: 12px 18px;
  }
  .edit-area-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text3);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .edit-textarea {
    width: 100%;
    min-height: 120px;
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.75;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    box-sizing: border-box;
  }
  .edit-textarea:focus { outline: none; border-color: var(--accent); }

  .checklist {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .cl-item {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px dashed var(--border2);
    color: var(--text3);
    white-space: nowrap;
  }
  .cl-item.done { border-style: solid; border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .cl-item.partial { border-style: solid; border-color: #e0a830; color: #7a5500; background: #fff8e4; }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    .right-col {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      top: auto;
      height: 240px;
      border-left: none;
      border-top: 1px solid var(--border);
      z-index: 90;
    }
    .left-col { padding-bottom: 260px; }
    .btn-copy { font-size: 11px; padding: 6px 10px; }
    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
    }
    .header-left h1 { font-size: 15px; }
    .header-right {
      width: 100%;
      justify-content: space-between;
    }
    .coach-select { min-width: 130px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🎙 音声添削フィードバックビルダー</h1>
    <p>セクションを選んで組み立てるだけ</p>
  </div>
  <div class="header-right">
    <div>
      <select class="coach-select" id="coach-select" onchange="updatePreview()">
        <option value="">コーチを選択...</option>
      </select>
      <div class="coach-warn" id="coach-warn">コーチを選んでからコピーしてください</div>
    </div>
    <div class="progress-dots" id="dots"></div>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>
</header>

<div class="layout">
  <div class="left-col">
    <div class="search-wrap">
      <input type="text" id="search-input" class="search-input" placeholder="🔍 テンプレートを検索..." oninput="searchTemplates()">
    </div>
    <div id="sections"></div>
  </div>
  <div class="right-col">
    <div class="prev-head">
      <div>
        <div class="prev-head-title">プレビュー</div>
        <div class="prev-head-sub">選択内容がここに組み合わさります</div>
      </div>
      <button class="btn-copy" id="copy-btn" onclick="copyText()" disabled>コピー</button>
    </div>
    <div class="prev-body" id="preview">
      <span class="prev-empty">左のセクションからテンプレートを選ぶと、ここにフィードバック文が表示されます。</span>
    </div>
    <div class="edit-area-wrap" id="edit-area-wrap" style="display:none">
      <div class="edit-area-label">編集エリア（修正してからコピー）</div>
      <textarea class="edit-textarea" id="edit-textarea" placeholder="テンプレートを選ぶと自動で入力されます"></textarea>
    </div>
    <div class="checklist" id="checklist"></div>
  </div>
</div>

      {type:"声量",text:"声がよく通っていて、はっきり聴き取れました。これは音読の基本なのでとても大事です。",memo:"声が出ている時"},
      {type:"声量",text:"声に力があって、最後まではっきり聴き取れました。この音量が続くと聴きやすさが全然違います。",memo:"声量が安定している時"},
      {type:"声量",text:"最後まで声が落ちずに読み切れていました。音読の基本がしっかりできています。",memo:"声量が安定している時"},
      {type:"声量",text:"声が前に出ていて、はっきり聴き取れました。この声の出し方を続けてください。",memo:"声量が良い時"},
      {type:"明瞭さ",text:"一音一音が明瞭で、どの単語も聴き取りやすかったです。丁寧に読んでくれているのが伝わりました。",memo:"丁寧な読み方の時"},
      {type:"明瞭さ",text:"どの音もはっきり出ていて、途中でわからなくなるところがなかったです。",memo:"明瞭さが高い時"},
      {type:"明瞭さ",text:"どの音もはっきりしていて、聴き取りに苦労しませんでした。",memo:"明瞭さが高い時"},
      {type:"明瞭さ",text:"一音一音に丁寧さがあって、全部きちんと届いてきました。",memo:"丁寧さが音に出ている時"},,
      {type:"声調・単体",text:"「＿＿」の声調、とてもきれいに出ていました。この精度で出し続けてください。",memo:"特定の単語の声調が正確な時"},
      {type:"声調・単体",text:"「＿＿」のところ、声調が迷いなくはっきり出ていて聴きやすかったです。",memo:"特定箇所の声調が安定している時"},
      {type:"声調・単体",text:"「＿＿」の第＿声、高さ・形ともにきれいに決まっていました。",memo:"声調の形が正確な時"},
      {type:"声調・安定",text:"声調が最初から最後まで安定していて、聴いていてとても聴きやすかったです。",memo:"全体的に声調が安定している時"},
      {type:"声調・安定",text:"声調のブレが少なく、どの音もしっかり決まっていました。集中できていましたね。",memo:"声調の精度が高い時"},
      {type:"声調・安定",text:"全体を通して声調が乱れず、安定して読み切れていました。これがベースになっていきます。",memo:"声調の安定感がある時"},
      {type:"声調・区別",text:"混同しやすい声調をちゃんと区別できていました。耳が育ってきている証拠ですよ。",memo:"紛らわしい声調を区別できた時"},
      {type:"声調・区別",text:"第＿声と第＿声の差がはっきり出ていて、どちらもきれいに識別できていました。",memo:"声調の区別が明確な時"},
      {type:"声調・区別",text:"声調の区別が明確で、意味がはっきり伝わってきました。ここが出来ると一気に伝わりやすくなります。",memo:"声調区別で意味が伝わった時"},
      {type:"声調・第1声",text:"第一声の高さが最後まで保てていました。ここをキープし続けるのは思ったより難しいので、すごいです。",memo:"第一声を最後まで維持できた時"},
      {type:"声調・第1声",text:"第一声がぶれずに高く出続けていて、全体が引き締まって聴こえました。",memo:"第一声の安定が全体に影響している時"},
      {type:"声調・第1声",text:"第一声の高さがそろっていて、聴いていて気持ちよかったです。",memo:"第一声が揃っている時"},
      {type:"声調・第2声",text:"第二声が最後まで上がりきっていました。途中で力が抜けないのがポイントなので、よかったです。",memo:"第二声が上がりきっている時"},
      {type:"声調・第2声",text:"第二声の上昇がはっきりしていて、疑問のニュアンスがしっかり伝わりました。",memo:"第二声が意味として機能している時"},
      {type:"声調・第2声",text:"第二声に勢いがあって、自然でした。この上がり方ができると中国語らしさが増します。",memo:"第二声に勢いがある時"},
      {type:"声調・第3声",text:"第三声がしっかり底まで下がれていました。日本人にとって一番難しいところなのに、きれいでした。",memo:"第三声が下がれている時"},
      {type:"声調・第3声",text:"第三声が低く安定していて、ネイティブに近い自然さがありました。",memo:"第三声が安定している時"},
      {type:"声調・第3声",text:"第三声が上ずらず、きちんと抑えられていました。ここができると発音全体が締まります。",memo:"第三声が抑えられている時"},
      {type:"声調・第4声",text:"第四声のキレが出ていて、聴いていてとても気持ちよかったです。",memo:"第四声にキレがある時"},
      {type:"声調・第4声",text:"第四声がスパッと落ちていて、中国語らしさが増していました。",memo:"第四声が明確に落ちている時"},
      {type:"声調・第4声",text:"第四声の力強さがよかったです。ここがはっきり出ると聞き取りやすくなります。",memo:"第四声が力強く出ている時"},
      {type:"声調・軽声",text:"軽声が自然に添えられていて、流れを邪魔していませんでした。",memo:"軽声が自然に出ている時"},
      {type:"声調・軽声",text:"軽声の軽さがちょうどよく、ナチュラルな流れになっていました。",memo:"軽声のバランスが良い時"},
      {type:"声調・軽声",text:"軽声をしっかり軽く処理できていました。ここは意外と難しいのに、きれいでした。",memo:"軽声が適切に処理されている時"},
      {type:"子音・zh/ch/sh",text:"そり舌音がしっかり出ていました。ここを正確に発音できる人は少ないので、素晴らしいです。",memo:"そり舌音が正確な時"},
      {type:"子音・zh/ch/sh",text:"「zh / ch / sh」の音が安定して出ていて、聴いていて心地よかったです。",memo:"そり舌音が安定している時"},
      {type:"子音・zh/ch/sh",text:"そり舌がしっかり巻けていて、中国語らしい音が出ていました。練習の積み重ねですね。",memo:"そり舌音の定着が見られる時"},
      {type:"子音・x/q",text:"「x / q」の音が日本語に引っ張られずにきれいに出ていました。",memo:"x/qが正確な時"},
      {type:"子音・x/q",text:"「x」の音が鋭く、「q」の音が柔らかく、どちらも自然に出せていました。",memo:"x/qのバランスが良い時"},
      {type:"子音・x/q",text:"「x / q」の発音が安定してきましたね。毎回ちゃんと出せるようになってきた証拠です。",memo:"x/qが定着してきた時"},
      {type:"子音・ü",text:"「ü」の音、きれいに出ていました。唇の形が正確にできているのが伝わります。",memo:"üが正確な時"},
      {type:"子音・ü",text:"「ü」が自然に口から出てきていました。日本語にない音なのに、すごいです。",memo:"üが自然に出ている時"},
      {type:"子音・ü",text:"「ü」の口の形がしっかり作れていて、違和感のない音が出ていました。",memo:"üの口形が正確な時"},
      {type:"子音・r",text:"「r」の音が中国語らしく出ていました。日本語の「ら行」にならずにできています。",memo:"rが正確な時"},
      {type:"子音・r",text:"「r」が安定して出せるようになってきましたね。定着してきた証拠です。",memo:"rが定着してきた時"},
      {type:"子音・r",text:"「r」の音、自然に出せていました。舌の使い方が身についてきていますよ。",memo:"rが自然に出ている時"},
      {type:"母音・er",text:"「er」の音が自然に出ていました。独特な音なのに違和感がなかったです。",memo:"erが自然な時"},
      {type:"母音・er",text:"「er」がきれいに出ていました。この音を自然に出せる人は少ないので、素晴らしいです。",memo:"erが正確な時"},
      {type:"母音・er",text:"「er」の音が安定してきましたね。難しい音なのに毎回きれいに出せています。",memo:"erが安定してきた時"},
      {type:"リズム・全体",text:"全体のリズムが整っていて、最初から最後まで気持ちよく聴けました。",memo:"全体のリズムが整っている時"},
      {type:"リズム・全体",text:"音読全体の流れが自然で、引っかかるところがなかったです。",memo:"流れが自然な時"},
      {type:"リズム・全体",text:"テンポが一定で安定していました。このリズム感が中国語らしさを作っています。",memo:"テンポが安定している時"},
      {type:"リズム・間",text:"句読点で自然に間が入っていて、意味のまとまりがはっきり伝わりました。",memo:"間が意味を助けている時"},
      {type:"リズム・間",text:"息継ぎのタイミングが自然で、聴いていて楽でした。",memo:"息継ぎが自然な時"},
      {type:"リズム・間",text:"文の区切り方が上手で、聴きながら内容がすっと入ってきました。",memo:"区切りが自然な時"},
      {type:"声量",text:"声が最後まで落ちずに安定していました。この声量が続くと聴きやすさが全然違います。",memo:"声量が安定している時"},
      {type:"声量",text:"声がよく通っていて、どの音もはっきり聴き取れました。",memo:"声量が十分な時"},
      {type:"声量",text:"声に力があって、発音のよさがしっかり伝わってきました。",memo:"声量が発音を後押ししている時"},
      {type:"明瞭さ",text:"一音一音がはっきりしていて、どの単語も聴き取りやすかったです。",memo:"明瞭さが高い時"},
      {type:"明瞭さ",text:"発音が明瞭で、内容がすっと頭に入ってきました。丁寧に読んでくれているのが伝わります。",memo:"丁寧さが明瞭さに出ている時"},
      {type:"明瞭さ",text:"どの音もぼやけず、しっかり届いてきました。この明瞭さを続けてください。",memo:"明瞭さが安定している時"}
    ]
  },
  advice:{
    label:"アドバイス",badge:"b-advice",min:1,max:3,multi:true,
    types:["声調・ずれ","声調・惜しい","声調・第1声","声調・第2声","声調・第3声","声調・連続","子音・日本語癖","子音・r/l","子音・zh/ch","子音・気息","リズム・速い","リズム・間","声量・小さい","声量・不安定","全体・聴き込み","全体・次回","全体・繰り返し","全体・一点集中"],
    items:[
      {type:"声調・ずれ",text:"「＿＿」の第＿声、少し〜になっているので、もう少し〜を意識してみてください。次回で必ず変わります。",memo:"声調がずれている単語がある時"},
      {type:"声調・ずれ",text:"「＿＿」の声調が少し揺れているところがありました。そこだけゆっくり確認してから読むと整います。",memo:"特定の単語の声調がずれている時"},
      {type:"声調・ずれ",text:"「＿＿」の部分、第＿声と第＿声が混ざってしまっています。一語ずつ意識して練習してみてください。",memo:"声調混同がある時"},
      {type:"声調・ずれ",text:"「＿＿」の声調が少し揺れています。ゆっくり一語ずつ確認してから読んでみると安定します。",memo:"特定の単語の声調がずれている時"},
      {type:"声調・ずれ",text:"「＿＿」の第＿声、もう少しはっきり出すと伝わりやすくなります。意識するだけで変わります。",memo:"声調をもう少し強調したい時"},
      {type:"声調・惜しい",text:"声調は全体的に惜しいところまで来ています。次は「＿＿」だけを意識して練習してみましょう。もうすぐ壁を超えます。",memo:"もう少しで完璧な時"},
      {type:"声調・惜しい",text:"声調の完成度がかなり上がってきました。あと一歩です。「＿＿」だけ集中してみてください。",memo:"もう少しな時"},
      {type:"声調・惜しい",text:"あと少しです。「＿＿」の声調だけ意識できれば、一段階上がります。",memo:"惜しいところまで来ている時"},
      {type:"声調・惜しい",text:"声調の完成度が上がってきました。次は「＿＿」に集中してみてください。もうすぐ完成します。",memo:"声調がほぼ整ってきた時"},
      {type:"声調・第1声",text:"第一声がところどころ下がってきてしまっています。高さをキープするイメージで読んでみてください。これは意識するだけで変わる部分なので大丈夫です。",memo:"第一声が下がってしまう時"},
      {type:"声調・第1声",text:"第一声を出す時に少し力が抜けている感じがあります。「高いまま終わる」イメージを持ってみてください。すぐ変わりますよ。",memo:"第一声の維持が難しい時"},
      {type:"声調・第1声",text:"第一声が途中で下がってきてしまっています。「ずっと高いまま」をキープする意識を持ってみてください。",memo:"第一声が維持できない時"},
      {type:"声調・第1声",text:"第一声の高さが後半になると落ちてきます。最初から最後まで同じ高さを意識してみてください。",memo:"文後半で第一声が落ちる時"},
      {type:"声調・第2声",text:"第二声が途中で力が抜けてしまっています。最後まで上げきるイメージを持つと変わります。次回聴くのが楽しみです。",memo:"第二声が途中で落ちる時"},
      {type:"声調・第2声",text:"第二声が上がりきる前に終わってしまっているところがあります。「エレベーターが上の階につくまで」というイメージで試してみてください。",memo:"第二声が途中で終わる時"},
      {type:"声調・第2声",text:"第二声が上がりきる前に終わってしまっています。「上がり続ける」意識で読んでみてください。",memo:"第二声が上がりきらない時"},
      {type:"声調・第2声",text:"第二声がフラットになっているところがあります。もう少し上昇感を出すと伝わりやすくなります。",memo:"第二声がフラットになっている時"},
      {type:"声調・第3声",text:"第三声が低くなりすぎて第4声と混ざっているところがあります。「低く短く」を意識してみましょう。慣れてくれば自然と体が覚えます。",memo:"第三声と第四声が混同されている時"},
      {type:"声調・第3声",text:"第三声が上ずってしまっているところがあります。「どん底まで下げる」くらいのつもりでやってみてください。",memo:"第三声が上ずる時"},
      {type:"声調・第3声",text:"第三声が少し高くなってしまっています。「できるだけ低く」を意識してみてください。",memo:"第三声が上ずっている時"},
      {type:"声調・第3声",text:"第三声と第一声が似た音になっているところがあります。第三声はもっと低く抑えるイメージです。",memo:"第三声と第一声が混同されている時"},
      {type:"声調・連続",text:"声調が続くと後半がなんとなくになっているところがあります。一語ずつゆっくり確認してから読んでみると整います。これは誰でも通る道なので焦らずに。",memo:"声調連続で崩れる時"},
      {type:"声調・連続",text:"2〜3音続くと後半の声調が弱くなってきます。ゆっくりでいいので一音ずつ意識して読んでみてください。",memo:"連続声調で崩れる時"},
      {type:"声調・連続",text:"声調が続く文で後半がなんとなくになっています。一語ずつ丁寧に確認しながら読んでみると変わります。",memo:"声調連続で崩れる時"},
      {type:"声調・連続",text:"複数の声調が続くと難しいですよね。一文をゆっくり確認してから録ると整います。焦らなくて大丈夫。",memo:"声調連続が難しい時"},
      {type:"子音・日本語癖",text:"「＿＿」の音、日本語の「＿＿」に引っ張られてしまっています。〜を意識してみると変わります。日本語母語の人ほどここで時間がかかるので、気長に取り組みましょう。",memo:"日本語癖がある時"},
      {type:"子音・日本語癖",text:"「＿＿」が日本語の発音になってしまっています。口の形を意識してゆっくり出してみてください。体が覚えるまで一緒に取り組みます。",memo:"日本語音に引っ張られている時"},
      {type:"子音・日本語癖",text:"「＿＿」が日本語の発音に引っ張られています。口の形を先に作ってから音を出すイメージで試してみてください。",memo:"日本語癖が強い時"},
      {type:"子音・日本語癖",text:"日本語の「＿＿」の癖が出てしまっています。これは時間をかければ必ず直るので、焦らず続けましょう。",memo:"日本語癖が出ている時"},
      {type:"子音・r/l",text:"「r」と「l」の区別が難しいポイントですよね。「r」は舌を巻いて、「l」は舌先を前歯の裏につけるイメージです。体で覚えるまで一緒に取り組みます。",memo:"r/lの混同がある時"},
      {type:"子音・r/l",text:"「r」が「l」になってしまっているところがあります。「r」は舌を奥に引くイメージで出すと変わります。焦らず少しずつやっていきましょう。",memo:"r→lになってしまう時"},
      {type:"子音・r/l",text:"「r」が「l」になってしまっています。「r」は舌を巻いたまま奥に引くイメージです。ゆっくり確認してみてください。",memo:"rがlになっている時"},
      {type:"子音・r/l",text:"「l」と「r」の区別はゆっくりなら出せても速くなると混ざりやすいです。まずゆっくりから練習してみましょう。",memo:"速い時にr/lが混同する時"},
      {type:"子音・zh/ch",text:"「zh / ch」の音が日本語の「じ／ち」になっているところがあります。舌を少し奥に引くイメージで試してみてください。これができると一段階ネイティブに近づきます。",memo:"そり舌音が弱い時"},
      {type:"子音・zh/ch",text:"そり舌が少し弱いです。「zh」を発音する時に舌先を上の歯茎に当ててから離すイメージで試してみてください。",memo:"そり舌が弱い時"},
      {type:"子音・zh/ch",text:"「zh」が「z」になってしまっているところがあります。舌を少し奥に引いて出すと変わります。",memo:"zhがzになっている時"},
      {type:"子音・zh/ch",text:"そり舌音が少し弱いです。舌を丸めた状態でキープしながら発音すると中国語らしくなります。",memo:"そり舌が弱い時"},
      {type:"子音・気息",text:"有気音の息が少し弱いところがあります。口の前に手を当てて、息が当たるか確認しながら練習してみてください。",memo:"有気音が弱い時"},
      {type:"子音・気息",text:"「p / t / k」などの有気音、もう少し息を出す意識を持てると一気にネイティブっぽくなります。",memo:"有気音をもう少し強くしたい時"},
      {type:"子音・気息",text:"有気音の息が少し足りないところがあります。「p・t・k」の後に息がパッと出るか確認してみてください。",memo:"有気音の息が足りない時"},
      {type:"子音・気息",text:"有気音と無気音の区別がもう少しはっきりすると伝わりやすくなります。息の量を意識してみてください。",memo:"有気音・無気音の区別が曖昧な時"},
      {type:"リズム・速い",text:"少しゆっくり読んでOKです。正確さを優先すると声調も安定してきます。スピードは後からついてくるので今は焦らなくて大丈夫です。",memo:"速く読みすぎている時"},
      {type:"リズム・速い",text:"速さよりも正確さを優先してみてください。ゆっくりでも声調がきれいな方が断然伝わります。焦らなくて大丈夫ですよ。",memo:"正確さよりスピードを優先してしまっている時"},
      {type:"リズム・速い",text:"速さよりも声調の正確さを優先してみてください。ゆっくり正確に読む練習が、後から速さにつながります。",memo:"速さを優先してしまっている時"},
      {type:"リズム・速い",text:"急ぎすぎると声調が崩れやすくなります。「丁寧に、ゆっくり」を意識して録ってみてください。",memo:"速く読んで声調が崩れている時"},
      {type:"リズム・間",text:"もう少し間を取ると聴きやすくなります。句読点のたびに一呼吸、というイメージで読んでみてください。",memo:"間が足りない時"},
      {type:"リズム・間",text:"少し間が詰まっていて、意味のまとまりが聞き取りにくいところがありました。区切りを意識してみてください。",memo:"意味の区切りが見えにくい時"},
      {type:"声量・小さい",text:"声がもう少し出ると発音の良さがもっと伝わります。「少し大きすぎかな」くらいがちょうどいいですよ。",memo:"声量を上げたい時"},
      {type:"声量・小さい",text:"声が小さいと声調も聞き取りにくくなってしまいます。自信を持って出してみてください。",memo:"声量と声調が連動している時"},
      {type:"声量・不安定",text:"最初は声が出ているのに後半で小さくなっています。息切れしないように、最後まで同じ音量を意識してみてください。",memo:"後半で声が落ちる時"},
      {type:"声量・不安定",text:"文中で音量が落ちているところがあります。文の頭から最後まで同じ力で読む意識を持ってみてください。",memo:"音量がムラになっている時"},
      {type:"全体・聴き込み",text:"今の課題は聴き込みを増やすと自然に解決するタイプです。インプットを増やしながら続けてみてください。",memo:"インプット不足が原因の課題に"},
      {type:"全体・聴き込み",text:"耳が正しい音を覚えると、発音も自然に近づいていきます。今は聴く量を増やす時期です。",memo:"耳から覚えるタイプの課題に"},
      {type:"全体・次回",text:"次の提出でこの一点だけを意識して録ってみてください。それだけで音が変わってくるはずです。",memo:"次の提出につなげたい時"},
      {type:"全体・次回",text:"今回のポイントを頭に入れた上で、もう一度声に出して練習してから提出してみてください。体で覚えると早いです。",memo:"練習してから提出することを促したい時"},
      {type:"全体・繰り返し",text:"もう一度録ってみてください。意識が変わっているはずなので、2回目は必ず違う音が出ます。",memo:"リテイクを促したい時"},
      {type:"全体・繰り返し",text:"同じテキストをもう一回試してみてください。1回目より2回目の方が必ずよくなります。",memo:"繰り返しの効果を伝えたい時"},
      {type:"全体・一点集中",text:"一つだけに絞ります。今回は「＿＿」だけを意識して次の練習をしてみてください。一点集中の方が早く変わります。",memo:"課題を一点に絞りたい時"},
      {type:"全体・一点集中",text:"全部一度に直そうとしなくて大丈夫です。今回は「＿＿」だけ。それだけで次回が変わります。",memo:"課題が多い時に絞り込む"},,
      {type:"声調・ずれ",text:"「＿＿」の声調が少し不安定です。一語ずつゆっくり確認してから読み直してみてください。",memo:"特定単語の声調がずれている時"},
      {type:"声調・ずれ",text:"「＿＿」のところ、声調が〜になってしまっています。ここだけ集中して練習してみましょう。",memo:"声調の方向がずれている時"},
      {type:"声調・ずれ",text:"「＿＿」の声調がところどころ揺れています。ゆっくり一音ずつ確認すると安定します。",memo:"声調が揺れている時"},
      {type:"声調・惜しい",text:"声調の精度がかなり上がってきています。あと少しです。次は「＿＿」だけ意識してみてください。",memo:"もう少しで完璧な時"},
      {type:"声調・惜しい",text:"全体的にかなりよくなってきました。「＿＿」の声調だけ整えば、一段階上がります。",memo:"あと一箇所という時"},
      {type:"声調・惜しい",text:"ここまで来ると、あとは細かい声調の精度を上げるだけです。「＿＿」に集中してみてください。",memo:"完成度が高くなってきた時"},
      {type:"声調・第1声",text:"第一声が文の後半になると少し下がってきてしまっています。「最後まで高いまま」をキープする意識で試してみてください。",memo:"文後半で第一声が落ちる時"},
      {type:"声調・第1声",text:"第一声の高さが途中で揺れているところがあります。「平らに高く」を意識して読んでみてください。",memo:"第一声が揺れる時"},
      {type:"声調・第1声",text:"第一声が出始めのところで少し低くなっています。最初からしっかり高さを出すイメージで試してみてください。",memo:"第一声の出だしが低い時"},
      {type:"声調・第2声",text:"第二声が途中から力が抜けてしまっています。「上がり続ける」イメージで最後まで出し切ってみてください。",memo:"第二声が途中で終わる時"},
      {type:"声調・第2声",text:"第二声がフラットになっているところがあります。もう少し上昇感を意識すると伝わりやすくなります。",memo:"第二声がフラットになっている時"},
      {type:"声調・第2声",text:"第二声の上がり幅が少し足りないところがあります。「もう一段上まで」というイメージで出してみてください。",memo:"第二声の上がり幅が不十分な時"},
      {type:"声調・第3声",text:"第三声が少し高くなってしまっています。「できるだけ低く抑える」を意識して読んでみてください。",memo:"第三声が上ずる時"},
      {type:"声調・第3声",text:"第三声が第一声と似た音になっているところがあります。もっと低く、底まで下げるイメージで試してみてください。",memo:"第三声と第一声が混同されている時"},
      {type:"声調・第3声",text:"第三声が安定しないところがあります。「どん底まで落とす」くらいの意識でちょうどよくなりますよ。",memo:"第三声が不安定な時"},
      {type:"声調・連続",text:"声調が続く文で、後半になるにつれて崩れやすくなっています。一音ずつゆっくり確認しながら読んでみてください。",memo:"連続声調で後半が崩れる時"},
      {type:"声調・連続",text:"2〜3音続くと声調が弱くなってきます。ゆっくりでいいので一語ずつ意識して読んでみましょう。",memo:"連続声調が難しい時"},
      {type:"声調・連続",text:"声調が連続するところで、なんとなくになってしまっている部分があります。ゆっくり一文を確認してから録ってみてください。",memo:"声調連続で曖昧になっている時"},
      {type:"子音・日本語癖",text:"「＿＿」の音が日本語の発音に引っ張られてしまっています。口の形を先に意識してから出すと変わります。",memo:"日本語癖が出ている時"},
      {type:"子音・日本語癖",text:"「＿＿」が日本語の「＿＿」になってしまっています。口の形をゆっくり確認しながら練習してみてください。体が覚えるまで一緒に取り組みます。",memo:"日本語音に引っ張られている時"},
      {type:"子音・日本語癖",text:"日本語の癖が出やすいところですが、意識するだけで変わる部分なので焦らず取り組んでみてください。",memo:"日本語癖があるが改善可能な時"},
      {type:"子音・r/l",text:"「r」が「l」になってしまっているところがあります。「r」は舌を巻いたまま奥に引くイメージで試してみてください。",memo:"rがlになっている時"},
      {type:"子音・r/l",text:"「r」と「l」の区別が難しいですよね。ゆっくりなら区別できると思うので、まずゆっくりから練習してみましょう。",memo:"r/lの区別が難しい時"},
      {type:"子音・r/l",text:"速くなると「r」と「l」が混ざりやすくなっています。スピードを落として一音ずつ確認してみてください。",memo:"速くなるとr/lが混同する時"},
      {type:"子音・zh/ch",text:"「zh / ch」が少し弱いです。舌を少し奥に引いて出すイメージで試してみてください。",memo:"zh/chのそり舌が弱い時"},
      {type:"子音・zh/ch",text:"そり舌音が日本語の「じ／ち」になってしまっているところがあります。舌先を少し奥に持っていくイメージで出してみてください。",memo:"zh/chが日本語音になっている時"},
      {type:"子音・zh/ch",text:"「zh」の音がもう少し舌を巻けるとよりきれいになります。舌を上の歯茎に当ててから離すイメージで試してみてください。",memo:"zhの舌の巻きが足りない時"},
      {type:"子音・気息",text:"有気音の息が少し足りないところがあります。「p・t・k」の後に息がパッと出るか確認してみてください。",memo:"有気音の息が弱い時"},
      {type:"子音・気息",text:"有気音と無気音の区別をもう少しはっきりさせると伝わりやすくなります。息の量を意識してみてください。",memo:"有気音・無気音の区別が曖昧な時"},
      {type:"子音・気息",text:"有気音の息の量を増やすだけで、発音がぐっとネイティブっぽくなります。口の前に手を当てて息が当たるか確認しながら練習してみてください。",memo:"有気音の息を強化したい時"},
      {type:"リズム・速い",text:"少しゆっくり読んでみてください。声調の正確さを優先する方が、後から速さもついてきます。",memo:"速く読みすぎている時"},
      {type:"リズム・速い",text:"スピードより正確さを優先してみましょう。ゆっくりでも声調がきれいな方が断然伝わります。",memo:"正確さよりスピードを優先している時"},
      {type:"リズム・速い",text:"急いで読むと声調が崩れやすくなります。「丁寧に、ゆっくり」を意識して録ってみてください。",memo:"速く読んで声調が崩れている時"},
      {type:"リズム・間",text:"少し間を取ると聴きやすくなります。句読点のたびに一呼吸置くイメージで読んでみてください。",memo:"間が少ない時"},
      {type:"リズム・間",text:"文の区切りが少し詰まっていて、意味のまとまりが聞き取りにくいところがありました。区切りを意識してみてください。",memo:"区切りが見えにくい時"},
      {type:"声量・小さい",text:"声がもう少し出ると、発音のよさがもっと伝わります。「少し大きすぎるかな」くらいがちょうどいいですよ。",memo:"声量が小さい時"},
      {type:"声量・小さい",text:"声が小さいと声調も聞き取りにくくなってしまいます。自信を持って声を出してみてください。",memo:"声量と声調が連動している時"},
      {type:"声量・不安定",text:"最初はよく聴こえているのに後半で声が小さくなっています。最後まで同じ音量をキープする意識で読んでみてください。",memo:"後半で声が落ちる時"},
      {type:"声量・不安定",text:"文の途中で音量が変わっているところがあります。頭から最後まで同じ力で出す意識を持ってみてください。",memo:"音量にムラがある時"},
      {type:"全体・聴き込み",text:"今の段階では、たくさん聴くことが一番の近道です。インプットを増やしながら続けてみてください。",memo:"インプット不足が課題の時"},
      {type:"全体・聴き込み",text:"耳が正しい音を覚えてくると、発音も自然と近づいてきます。今は聴く量を増やすことを意識してみてください。",memo:"耳から覚えるタイプの課題の時"},
      {type:"全体・次回",text:"次の提出でこの部分を意識して録ってみてください。声に出してみると、ここが一番変わりやすいポイントです。",memo:"次の提出につなげたい時"},
      {type:"全体・次回",text:"次の提出では〜を意識してみてください。繰り返し声に出すことで必ず体が覚えていきます。",memo:"次回の意識ポイントを示したい時"},
      {type:"全体・繰り返し",text:"もう一度同じテキストで録ってみてください。意識が変わった分、必ず違う音が出ます。",memo:"リテイクを促したい時"},
      {type:"全体・繰り返し",text:"同じ文をもう一回試してみてください。1回目より2回目の方が必ずよくなります。",memo:"繰り返しの効果を伝えたい時"},
      {type:"全体・一点集中",text:"課題はいくつかありますが、今は「＿＿」だけに絞って練習してみてください。一点集中の方が早く変わります。",memo:"課題を一点に絞りたい時"},
      {type:"全体・一点集中",text:"全部一度に直そうとしなくて大丈夫です。今回は「＿＿」だけ。それだけで次回が変わりますよ。",memo:"課題が多い時に絞り込む"}
    ]
  },

    items:[
      {type:"継続称賛・ストリーク",text:"〇〇さん、〜日連続。この記録、簡単なようで本当に難しいです。誇っていいですよ。",memo:"連続記録を強く称える"},
      {type:"継続称賛・ストリーク",text:"〜日続いていますね。この継続力が、他の人との差になっていきます。",memo:"継続の価値を伝えたい時"},
      {type:"継続称賛・習慣化",text:"毎日提出することが当たり前になってきましたね。この「当たり前」が一番強いです。",memo:"習慣化を称える"},
      {type:"継続称賛・習慣化",text:"提出のルーティンができてきましたね。その習慣が発音力を底上げしています。",memo:"ルーティン化してきた時"},
      {type:"継続称賛・量の価値",text:"毎回の提出が積み上がって、今の〇〇さんの発音力になっています。量は絶対に嘘をつきません。",memo:"継続の量を称えたい時"},
      {type:"継続称賛・量の価値",text:"今まで提出してきた一回一回が、全部〇〇さんの力になっています。この積み上げは誰にも取れません。",memo:"長期継続を称える"},
      {type:"継続称賛・忙しい中",text:"どんなに忙しい日でも諦めずに提出してくれているの、ちゃんと気づいていますよ。",memo:"多忙な中で継続している時"},
      {type:"継続称賛・忙しい中",text:"バタバタした日でも提出してくれているの、すごいと思います。その一回が全然違います。",memo:"忙しい日でも続けている時"},
      {type:"継続称賛・再開",text:"間が空いても戻ってきてくれてありがとうございます。またここから一緒に積み上げていきましょう。",memo:"復帰を歓迎したい時"},
      {type:"継続称賛・再開",text:"戻ってきてくれましたね。ブランクは気にしなくていいです。また再スタートしましょう。",memo:"ブランクをポジティブに流す"},
      {type:"期待値調整・時間軸",text:"発音は「ある日突然変わる」感覚が来ます。今はその手前を積み上げている時期です。",memo:"焦りが見える時"},
      {type:"期待値調整・時間軸",text:"語学の上達には「踊り場」があります。今がそれかもしれません。でもここを越えると一気に変わります。",memo:"停滞感がある時"},
      {type:"期待値調整・プロセス",text:"自分では気づかないことが多いですが、毎回確実に変わっています。第三者から見ると明らかです。",memo:"本人が気づいていない時"},
      {type:"期待値調整・プロセス",text:"「成長している実感がない」という感覚は、むしろ真剣に取り組んでいる人ほど感じやすいです。今はその時期です。",memo:"停滞感を正しく解釈してほしい時"},
      {type:"期待値調整・積み上げ",text:"今は「貯金期間」です。今やっていることが後から一気に花開く時が来ます。",memo:"今が積み上げの時期"},
      {type:"期待値調整・積み上げ",text:"発音の上達は急には見えません。でも確実に積み上がっています。今の練習は絶対に無駄になりません。",memo:"積み上げの価値を伝えたい時"},
      {type:"期待値調整・比較不要",text:"人と比べる必要はないです。〇〇さんには〇〇さんのペースと強みがあります。",memo:"比較してしまっている時"},
      {type:"期待値調整・比較不要",text:"上達のスピードは人それぞれです。〇〇さんのペースが正解なので、焦らなくていいです。",memo:"他者比較で焦っている時"},
      {type:"期待値調整・難しさ共感",text:"中国語の発音は本当に難しいです。でも難しいからこそ、続けることに価値があります。一緒に乗り越えましょう。",memo:"挫折しそうな時"},
      {type:"期待値調整・難しさ共感",text:"難しいと感じるのは当然です。日本語と全く違う音を作っているんですから。でもその壁は必ず越えられます。",memo:"難しさに直面している時"},
      {type:"期待値調整・初期",text:"最初は「合ってるかわからない」が普通です。その不安は誰でも通る道なので、気にせず続けてください。",memo:"初期の不安に"},
      {type:"期待値調整・初期",text:"入会して最初の1ヶ月が一番しんどいです。ここを越えると景色が変わるので、もう少し一緒に頑張りましょう。",memo:"入会初期の停滞に"},
      {type:"ゴール想起・原点",text:"中国語を始めた理由、ふと思い出してみてください。今の練習は全部そこにつながっています。",memo:"モチベーションが落ちている時"},
      {type:"ゴール想起・原点",text:"最初に「話せるようになりたい」と思った気持ちを大切に。今やっていることは全部そこへの道です。",memo:"原点を思い出させたい時"},
      {type:"ゴール想起・未来像",text:"発音が整ってくると、ドラマや映画が字幕なしでわかるようになってきます。今の積み上げがそこにつながっています。",memo:"リスニング力の向上を見据えた時"},
      {type:"ゴール想起・未来像",text:"発音力が上がると、中国語を使える場面が一気に広がります。今はその土台を作っている時期ですよ。",memo:"将来の使用場面を見せたい時"},
      {type:"ゴール想起・変化の予告",text:"もうすぐ「あれ、変わった？」と自分で気づけるタイミングが来ると思います。その直前まで来ています。",memo:"変化が近い時"},
      {type:"ゴール想起・変化の予告",text:"次のフェーズに入ろうとしている感じがします。もうすぐ大きな変化が来ますよ。",memo:"レベルアップの兆しがある時"},
      {type:"関係構築・個別感",text:"〇〇さんの発音の特徴と強みがわかってきたので、ここからより的確なフィードバックができます。",memo:"継続して個別把握できてきた時"},
      {type:"関係構築・個別感",text:"〇〇さん専用のフィードバックができるようになってきました。続けてきてくれたおかげです。",memo:"個別対応を強調したい時"},
      {type:"関係構築・一緒に感",text:"〇〇さんの音が少しずつ変わっていくのを毎回楽しみにしています。",memo:"継続している生徒さんへの感情"},
      {type:"関係構築・一緒に感",text:"〇〇さんの発音が変わっていく過程を一緒に追えているのが、正直楽しいです。引き続きよろしくお願いします。",memo:"関係性を深めたい時"},
      {type:"関係構築・気にかけ",text:"どんな出来でも提出してくれることが一番大事です。完璧じゃなくていいので、気軽に送ってください。",memo:"ハードルを下げたい時"},
      {type:"関係構築・気にかけ",text:"うまく読めなかった日でも提出してくれると嬉しいです。その一回が確実に積み上がります。",memo:"完璧主義が邪魔している時"},
      {type:"継続称賛・ストリーク",text:"〜日連続ですね。この記録、本当にすごいです。この習慣が一番の財産になっていきますよ。",memo:"連続記録を称える"},
      {type:"継続称賛・ストリーク",text:"〜日続いていますね！この継続力が、他の人との差になっていきます。",memo:"連続記録の価値を伝えたい時"},
      {type:"継続称賛・習慣化",text:"毎日提出することが習慣になってきましたね。この「当たり前」が一番の強さです。",memo:"習慣化が定着してきた時"},
      {type:"継続称賛・習慣化",text:"提出のリズムができてきていますね。この習慣が発音力をじわじわと底上げしています。",memo:"リズムが生まれてきた時"},
      {type:"継続称賛・量の価値",text:"今まで積み上げてきた一回一回が、今日の発音力になっています。量は絶対に嘘をつきません。",memo:"継続の量を称えたい時"},
      {type:"継続称賛・量の価値",text:"ここまで続けてきた分が、ちゃんと力になっています。この積み上げは誰にも取れません。",memo:"長期継続を称える"},
      {type:"継続称賛・忙しい中",text:"忙しい中でも提出し続けてくれているの、ちゃんと見えていますよ。その一回一回が積み上がっています。",memo:"多忙な中で継続している時"},
      {type:"継続称賛・忙しい中",text:"バタバタしていても提出してくれているの、すごいと思います。その一回が本当に違います。",memo:"忙しい日でも続けている時"},
      {type:"継続称賛・再開",text:"間が空いても戻ってきてくれましたね。ブランクは関係ないです。また一緒に積み上げていきましょう。",memo:"復帰・ブランクを気にしない"},
      {type:"継続称賛・再開",text:"また来てくれてよかったです。またここから再スタートしていきましょう。",memo:"復帰・シンプルに歓迎"},
      {type:"期待値調整・時間軸",text:"発音は「ある日突然わかる」瞬間が来ます。今はその直前を積み上げている時期ですよ。",memo:"焦りが見える時"},
      {type:"期待値調整・時間軸",text:"語学には必ず踊り場があります。今がそれかもしれません。でもここを越えると一気に変わります。",memo:"停滞感がある時"},
      {type:"期待値調整・プロセス",text:"自分では気づきにくいですが、毎回確実に変わっています。第三者として聴いていると明らかです。",memo:"本人が気づいていない時"},
      {type:"期待値調整・プロセス",text:"成長を実感しにくい時期は、むしろ真剣に取り組んでいる証拠でもあります。今はその時期です。",memo:"停滞感を正しく解釈してほしい時"},
      {type:"期待値調整・積み上げ",text:"今やっていることは、後から必ず花開きます。今は「貯金期間」だと思って続けてみてください。",memo:"積み上げの時期を伝えたい時"},
      {type:"期待値調整・積み上げ",text:"上達はすぐには見えないですが、確実に積み上がっています。今の練習は絶対に無駄になりません。",memo:"積み上げの価値を伝えたい時"},
      {type:"期待値調整・比較不要",text:"人と比べる必要はないです。自分のペースで着実に進んでいくことが一番大事ですよ。",memo:"他者比較で焦っている時"},
      {type:"期待値調整・比較不要",text:"上達のスピードは人それぞれです。自分のペースを崩さずに続けることが、一番の近道です。",memo:"ペースについて不安がある時"},
      {type:"期待値調整・難しさ共感",text:"中国語の発音は、日本人にとって本当に難しいです。でも難しいからこそ、続けることに大きな意味があります。",memo:"挫折しそうな時"},
      {type:"期待値調整・難しさ共感",text:"難しいと感じるのは当然です。日本語と全く仕組みが違う音を作っているんですから。でも必ず越えられます。",memo:"難しさに直面している時"},
      {type:"期待値調整・初期",text:"最初は「合っているかわからない」が普通です。その感覚は誰でも通る道なので、気にせず続けてください。",memo:"初期の不安がある時"},
      {type:"期待値調整・初期",text:"入会して最初の1〜2ヶ月が一番しんどい時期です。ここを越えると景色が変わるので、もう少し一緒に頑張りましょう。",memo:"入会初期の停滞に"},
      {type:"ゴール想起・原点",text:"中国語を始めた理由を、ふと思い出してみてください。今の練習は全部そこにつながっています。",memo:"モチベーションが下がっている時"},
      {type:"ゴール想起・原点",text:"最初に「話せるようになりたい」と思った気持ちを大切に。今やっていることは全部そこへの道ですよ。",memo:"原点を思い出させたい時"},
      {type:"ゴール想起・未来像",text:"発音が整ってくると、ドラマや映画を字幕なしで楽しめるようになっていきます。今の積み上げがそこにつながっています。",memo:"未来の使用場面を見せたい時"},
      {type:"ゴール想起・未来像",text:"発音力が上がると、中国語を使える場面が一気に広がります。今はその土台を作っている時期ですよ。",memo:"将来を見据えた話をしたい時"},
      {type:"ゴール想起・変化の予告",text:"もうすぐ「あれ、変わったな」と自分で気づける瞬間が来ると思います。その直前まで来ていますよ。",memo:"変化が近い時"},
      {type:"ゴール想起・変化の予告",text:"次のフェーズに入ろうとしている感じがします。もうすぐ大きな変化が来ますよ。",memo:"レベルアップの兆しがある時"},
      {type:"関係構築・個別感",text:"続けてくれているおかげで、発音の特徴や強みがよくわかってきました。ここからより的確にフィードバックできます。",memo:"個別把握が進んできた時"},
      {type:"関係構築・個別感",text:"毎回聴いてきたからこそわかる変化があります。その積み上げを一緒に見てきました。",memo:"継続的に関わってきたことを伝えたい時"},
      {type:"関係構築・一緒に感",text:"毎回の音読が変わっていくのを聴くのが、正直楽しいです。引き続き一緒にやっていきましょう。",memo:"継続している生徒さんへの感情"},
      {type:"関係構築・一緒に感",text:"発音が少しずつ変わっていくのを一緒に追えているのが嬉しいです。",memo:"変化を共に見ていることを伝えたい時"},
      {type:"関係構築・気にかけ",text:"うまくいかない日でも提出してくれると嬉しいです。完璧じゃなくていいので、気軽に送ってください。",memo:"完璧主義が邪魔している時"},
      {type:"関係構築・気にかけ",text:"どんな出来でも、提出してくれることが一番大事です。その一回が確実に積み上がっていきます。",memo:"ハードルを下げたい時"},
      {type:"マイルストーン・提出10回",text:"〇〇さん、提出10回達成です。最初の10回が一番しんどいのに、ちゃんとここまで来ました。ここからが本当のスタートです。",memo:"提出10回達成時"},
      {type:"マイルストーン・提出10回",text:"10回の提出、すごいことですよ。この10回が全部〇〇さんの発音力になっています。",memo:"10回達成・シンプルに称える"},
      {type:"マイルストーン・提出10回",text:"気づいたら10回積み上がっていましたね。最初の10回を超えた人はそのまま続いていく、というのが実感としてあります。",memo:"10回の節目の重要性を伝えたい時"},
      {type:"マイルストーン・提出30回",text:"〇〇さん、提出30回突破です。30回続けられる人は本当に少ない。それだけで発音が変わっている証拠です。",memo:"提出30回達成時"},
      {type:"マイルストーン・提出30回",text:"30回分の積み上げ、一回一回全部受け取っています。この数字は〇〇さんの本気の証明です。",memo:"30回・本気を称えたい時"},
      {type:"マイルストーン・提出30回",text:"提出30回。この回数を積んでいる人の発音は必ず変わっています。今の〇〇さんがその証拠です。",memo:"30回・成果と紐づけたい時"},
      {type:"マイルストーン・提出50回",text:"〇〇さん、提出50回。これは本当にすごい記録です。50回分の音が、今の〇〇さんの発音力そのものです。",memo:"提出50回達成時"},
      {type:"マイルストーン・提出50回",text:"50回提出達成です。ここまで来た人には必ず大きな変化が起きています。〇〇さんも例外ではないです。",memo:"50回・変化を確認したい時"},
      {type:"マイルストーン・提出50回",text:"50回の積み上げ、もう誰にも取れない財産になっています。この先の50回がさらに楽しみです。",memo:"50回・先への期待を伝えたい時"},
      {type:"マイルストーン・提出100回",text:"〇〇さん、提出100回。この数字が〇〇さんのすべてを証明しています。本当にすごいです。",memo:"100回達成・感動を伝えたい時"},
      {type:"マイルストーン・提出100回",text:"100回続けられた人の発音は別次元にあります。〇〇さんはもうその場所にいます。",memo:"100回・実力を称えたい時"},
      {type:"マイルストーン・提出100回",text:"提出100回突破。この記録を持っている人はほんとうにわずかです。その一人になってくれたこと、正直嬉しいです。",memo:"100回・希少性を伝えたい時"},
      {type:"マイルストーン・継続1ヶ月",text:"〇〇さん、入会から1ヶ月が経ちました。この1ヶ月で積み上げてきたことが、これからの発音の土台になっていきます。",memo:"1ヶ月継続時"},
      {type:"マイルストーン・継続1ヶ月",text:"1ヶ月継続、達成です。最初の1ヶ月が一番しんどいのに、やり切りました。ここからが一番伸びる時期です。",memo:"1ヶ月・ここからが本番と伝えたい時"},
      {type:"マイルストーン・継続1ヶ月",text:"1ヶ月前と今の〇〇さんの発音、全然違います。自分ではわかりにくいと思うけど、こちらからははっきり見えています。",memo:"1ヶ月の変化を可視化したい時"},
      {type:"マイルストーン・継続3ヶ月",text:"〇〇さん、3ヶ月継続です。3ヶ月続けた人は入会時とは別の発音になっています。〇〇さんをずっと見てきているから、それが本当によくわかります。",memo:"3ヶ月継続時"},
      {type:"マイルストーン・継続3ヶ月",text:"3ヶ月続けてくれました。語学は3ヶ月を越えると急に景色が変わり始めます。今がまさにそのタイミングです。",memo:"3ヶ月・転換点を伝えたい時"},
      {type:"マイルストーン・継続3ヶ月",text:"3ヶ月前の〇〇さんと今の〇〇さんは、もう別人です。この変化を一番近くで見てきました。",memo:"3ヶ月の成長を感情込みで伝えたい時"},
      {type:"マイルストーン・継続6ヶ月",text:"〇〇さん、6ヶ月継続。ここまで続けてきた〇〇さんの発音は、入会当初とは完全に別物です。その積み重ねを一番近くで見てきました。",memo:"6ヶ月継続時"},
      {type:"マイルストーン・継続6ヶ月",text:"半年間、本当にありがとうございます。6ヶ月続けた人の積み上げは、絶対に裏切りません。この先もずっと続けてほしいです。",memo:"6ヶ月・感謝と継続を伝えたい時"},
      {type:"現在価値確認・客観的変化",text:"入会前の〇〇さんの発音と、今の〇〇さんの発音。同じ人とは思えないくらい変わっています。それが事実です。",memo:"成長を客観的に伝えたい時"},
      {type:"現在価値確認・客観的変化",text:"今回の音読を聴いて、あらためて思います。最初のころと比べると、本当に変わりました。",memo:"変化を改めて伝えたい時"},
      {type:"現在価値確認・客観的変化",text:"すでに変わっています。自分では気づきにくいですが、こちらから見るとはっきりわかります。今この瞬間の〇〇さんの発音は、入会時とは違います。",memo:"現時点での変化を強調したい時"},
      {type:"現在価値確認・現在地確認",text:"積み上げてきた分が、すでに今日の発音に出ています。今の〇〇さんの音は、間違いなく入会前より上にあります。",memo:"現在地を確認させたい時"},
      {type:"現在価値確認・現在地確認",text:"成果が出ていないように感じているかもしれませんが、今日の音読を聴けばわかります。ちゃんと変わっています。",memo:"実感がない時に"},
      {type:"現在価値確認・現在地確認",text:"今の〇〇さんには、最初の頃には出せなかった音が出ています。その事実がすでに答えです。",memo:"地道な成長を可視化したい時"},
      {type:"現在価値確認・現在地確認",text:"今日の音読、最初の頃と聴き比べてみてほしいです。自分でも驚くと思います。それくらい変わっています。",memo:"客観的に変化を見せたい時"},
      {type:"現在価値確認・自己評価サポート",text:"〇〇さんはもうすでに変わっています。これだけ続けてきたのだから、変わらないほうがおかしい。今の自分をちゃんと認めてあげてください。",memo:"自己評価が低い生徒さんに"},
      {type:"現在価値確認・自己評価サポート",text:"「まだ全然ダメです」と思っているかもしれないけど、それは違います。今の〇〇さんの発音は、確実に入会時より上です。",memo:"自己評価が過小な時"},
      {type:"現在価値確認・自己評価サポート",text:"発音の変化は自分では気づきにくいものです。でもこちらからははっきり見えています。〇〇さんは変わっています。",memo:"変化に気づいていない生徒さんに"},
      {type:"現在価値確認・体験の強化",text:"今日の音読を聴いて、「続けてきてよかった」と思いました。〇〇さんの積み上げが音に出ています。",memo:"継続体験を強化したい時"},
      {type:"現在価値確認・体験の強化",text:"〇〇さんの発音が変わっていく過程を毎回届けてもらっていること、改めてありがたいと思っています。",memo:"関係性を深めたい時"},
      {type:"サービス価値想起・フィードバックの価値",text:"発音の上達に一番大事なのは、正しい耳を持った人からのフィードバックを継続して受けること。〇〇さんはその環境を活かしています。",memo:"サービス価値を感じにくくなっている時"},
      {type:"サービス価値想起・フィードバックの価値",text:"一人で練習するだけでは気づけない部分が、必ず存在します。毎回のフィードバックは、その盲点をひとつずつつぶしていく作業です。",memo:"自習との差を伝えたい時"},
      {type:"サービス価値想起・フィードバックの価値",text:"間違ったまま練習すると、間違いが定着してしまいます。毎回確認しながら積み上げられることが、このサービスの一番の強みです。",memo:"サービスの必要性を伝えたい時"},
      {type:"サービス価値想起・複利効果",text:"続けてフィードバックをもらうほど、精度が上がっていきます。〇〇さんの発音の特徴が蓄積されているので、今のフィードバックは入会当初より何倍も的確です。",memo:"継続の複利を伝えたい時"},
      {type:"サービス価値想起・複利効果",text:"毎回の提出とフィードバックのサイクルが続くほど、修正の速度が上がっていきます。このサイクルを回し続けることが、一番効率的な発音上達の道です。",memo:"サイクルの価値を伝えたい時"},
      {type:"サービス価値想起・複利効果",text:"フィードバックの積み重ねが、次のフィードバックの精度を上げていきます。続けるほど、サポートの質が〇〇さん専用に最適化されていきます。",memo:"継続で質が上がることを伝えたい時"},
      {type:"サービス価値想起・自習との差",text:"独学で発音を直そうとすると、正しいかどうか判断できない状態で練習し続けることになります。〇〇さんはその落とし穴を、毎回のフィードバックで回避できています。",memo:"独学のリスクと比較して伝えたい時"},
      {type:"サービス価値想起・プロの耳",text:"プロの耳が毎回確認しているからこそ、変な癖がつく前に修正できています。この仕組みがあることで、〇〇さんの上達は最短距離になっています。",memo:"サービスの専門性を伝えたい時"},
      {type:"サービス価値想起・プロの耳",text:"独学では気づけない発音の癖も、毎回のフィードバックで早期に修正できます。それが積み重なると、上達の速度が全然違ってきます。",memo:"プロによる早期修正の価値を伝えたい時"},
      {type:"サービス価値想起・自習との差",text:"参考書や動画だけでは、自分の発音のどこが違うのかわかりません。毎回チェックしてもらえる環境がある〇〇さんは、その点で大きなアドバンテージを持っています。",memo:"サービスの優位性を伝えたい時"},
      {type:"損失回避・停滞リスク",text:"今のペースが続けば、確実に変わります。ここで止まることが一番もったいない。それだけ手前まで来ています。",memo:"停滞・中断リスクがある時"},
      {type:"損失回避・停滞リスク",text:"発音の習慣はつくるより、崩れる方が早いです。今の〇〇さんのペースを、このまま続けていきましょう。",memo:"習慣維持の重要性を伝えたい時"},
      {type:"損失回避・停滞リスク",text:"ここまで積み上げてきた時間と回数が、〇〇さんの発音力になっています。それを止める理由は何もないです。",memo:"継続する理由を与えたい時"},
      {type:"損失回避・継続vs停止",text:"続けている人と止まった人の差は、止まった瞬間から広がり始めます。〇〇さんが続けているということは、その差をつけ続けている側にいるということです。",memo:"継続の価値を伝えたい時"},
      {type:"損失回避・継続vs停止",text:"積み上げてきたものは、続ける限り消えません。でも止まった瞬間から少しずつ薄れていきます。今続けていることが、その積み上げを守っています。",memo:"継続の保全効果を伝えたい時"},

const SEC_ORDER = ["opening","growth","sound","advice","ltv","closing"];
const LABELS = {opening:"オープニング",growth:"成長",sound:"発音ほめ",advice:"アドバイス",ltv:"LTV",closing:"クロージング"};
const COUNTER_LABELS = {opening:"1つ選択",growth:"1つ選択",sound:"2〜3つ選択",advice:"1〜3つ選択",ltv:"1つ選択",closing:"1つ選択"};

const state = {opening:null,growth:null,sound:[],advice:[],ltv:null,closing:null};
const activeFilter = {opening:null,growth:null,sound:null,advice:null,ltv:null,closing:null};
let searchQuery = "";

function buildUI(){
  const sel = document.getElementById("coach-select");
  COACHES.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  const cont = document.getElementById("sections");
  SEC_ORDER.forEach(key => {
    const sec = DATA[key];
    const el = document.createElement("div");
    el.className = "section";
    el.id = "sec-" + key;
    el.innerHTML = `
      <div class="sec-header" onclick="toggleSection('${key}')">
        <span class="badge ${sec.badge}">${sec.label}</span>
        <span class="sec-title"></span>
        <span class="sec-counter" id="cnt-${key}">${COUNTER_LABELS[key]}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="sec-body" id="body-${key}">
        <div class="filter-row" id="filter-${key}"></div>
        ${sec.multi ? `<p class="multi-hint">${sec.min}〜${sec.max}つ選択してください</p>` : ""}
        <div class="templates" id="tpls-${key}"></div>
      </div>`;
    cont.appendChild(el);
    buildFilters(key);
    renderTemplates(key);
  });
  updateChecklist();
  updateDots();
}

function toggleSection(key){
  document.getElementById("sec-"+key).classList.toggle("open");
}

function buildFilters(key){
  const wrap = document.getElementById("filter-"+key);
  const allBtn = document.createElement("button");
  allBtn.className = "tag active";
  allBtn.textContent = "すべて";
  allBtn.onclick = () => setFilter(key, null, allBtn);
  wrap.appendChild(allBtn);
  DATA[key].types.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tag";
    btn.textContent = t;
    btn.onclick = () => setFilter(key, t, btn);
    wrap.appendChild(btn);
  });
}

function setFilter(key, val, btn){
  activeFilter[key] = val;
  document.querySelectorAll("#filter-"+key+" .tag").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderTemplates(key);
}

function searchTemplates(){
  searchQuery = document.getElementById("search-input").value.trim().toLowerCase();
  SEC_ORDER.forEach(k => {
    renderTemplates(k);
    if(searchQuery){
      const hasMatch = DATA[k].items.some(it =>
        it.text.toLowerCase().includes(searchQuery) || it.memo.toLowerCase().includes(searchQuery)
      );
      if(hasMatch) document.getElementById("sec-"+k).classList.add("open");
    }
  });
}

function renderTemplates(key){
  const wrap = document.getElementById("tpls-"+key);
  wrap.innerHTML = "";
  const filter = activeFilter[key];
  const q = searchQuery;
  DATA[key].items.filter(it =>
    (!filter || it.type === filter) &&
    (!q || it.text.toLowerCase().includes(q) || it.memo.toLowerCase().includes(q))
  ).forEach(it => {
    const realIdx = DATA[key].items.indexOf(it);
    const card = document.createElement("div");
    card.className = "tpl-card";
    const isMulti = DATA[key].multi;
    const sel = isMulti ? state[key].includes(realIdx) : state[key] === realIdx;
    if(sel) card.classList.add("selected");
    card.innerHTML = `<div class="tpl-text">${it.text}</div><div class="tpl-memo">${it.memo}</div>`;
    card.onclick = () => selectItem(key, realIdx, isMulti);
    wrap.appendChild(card);
  });
}

function selectItem(key, idx, isMulti){
  if(isMulti){
    const arr = state[key];
    if(arr.includes(idx)){ arr.splice(arr.indexOf(idx),1); }
    else { if(arr.length >= DATA[key].max) return; arr.push(idx); }
  } else {
    state[key] = state[key] === idx ? null : idx;
  }
  renderTemplates(key);
  updateCounter(key);
  updatePreview();
  updateChecklist();
  updateDots();
}

function updateCounter(key){
  const sec = DATA[key];
  const el = document.getElementById("cnt-"+key);
  const n = sec.multi ? state[key].length : (state[key] !== null ? 1 : 0);
  if(n === 0){ el.textContent = COUNTER_LABELS[key]; el.className = "sec-counter"; }
  else if(n < sec.min){ el.textContent = `${n}/${sec.max}（あと${sec.min-n}つ）`; el.className = "sec-counter warn"; }
  else { el.textContent = `${n}/${sec.max}つ選択済`; el.className = "sec-counter ok"; }
}

function updatePreview(){
  const prev = document.getElementById("preview");
  const copyBtn = document.getElementById("copy-btn");
  const parts = [];
  SEC_ORDER.forEach(k => {
    const sec = DATA[k];
    const texts = sec.multi ? state[k].map(i => sec.items[i].text) : (state[k] !== null ? [sec.items[state[k]].text] : []);
    if(texts.length) parts.push({key:k, label:sec.label, texts});
  });
  const editWrap = document.getElementById("edit-area-wrap");
  const editTextarea = document.getElementById("edit-textarea");
  if(!parts.length){
    prev.innerHTML = '<span class="prev-empty">左のセクションからテンプレートを選ぶと、ここにフィードバック文が表示されます。</span>';
    editWrap.style.display = "none";
    editTextarea.value = "";
    copyBtn.disabled = true;
    return;
  }
  const coach = document.getElementById("coach-select").value;
  copyBtn.disabled = !coach;
  prev.innerHTML = parts.map(p => `
    <div class="prev-section">
      <div class="prev-section-label">${p.label}</div>
      ${p.texts.map(t => `<div class="prev-section-text">${DATA[p.key].multi && p.texts.length > 1 ? '・' : ''}${t}</div>`).join("")}
    </div>`).join("");
  // 編集エリアにプレーンテキストを反映（既存の手動編集は上書きしない）
  const plainLines = [];
  parts.forEach(p => {
    p.texts.forEach(t => plainLines.push((DATA[p.key].multi && p.texts.length > 1 ? "・" : "") + t));
  });
  editTextarea.value = plainLines.join("\n\n");
  editWrap.style.display = "block";
}

function updateChecklist(){
  const cl = document.getElementById("checklist");
  cl.innerHTML = "";
  SEC_ORDER.forEach(k => {
    const sec = DATA[k];
    const n = sec.multi ? state[k].length : (state[k] !== null ? 1 : 0);
    const span = document.createElement("span");
    const isDone = n >= sec.min && n <= sec.max;
    const isPartial = n > 0 && !isDone;
    span.className = "cl-item" + (isDone ? " done" : isPartial ? " partial" : "");
    span.textContent = LABELS[k] + (isDone ? " ✓" : isPartial ? ` (${n})` : "");
    cl.appendChild(span);
  });
}

function updateDots(){
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  SEC_ORDER.forEach(k => {
    const sec = DATA[k];
    const n = sec.multi ? state[k].length : (state[k] !== null ? 1 : 0);
    const d = document.createElement("div");
    d.className = "dot" + (n >= sec.min ? " done" : n > 0 ? " partial" : "");
    d.title = LABELS[k];
    dots.appendChild(d);
  });
}

function copyText(){
  const coach = document.getElementById("coach-select").value;
  if(!coach){
    const w = document.getElementById("coach-warn");
    w.classList.add("show");
    setTimeout(() => w.classList.remove("show"), 3000);
    return;
  }
  const usedLabels = [];
  SEC_ORDER.forEach(k => {
    const sec = DATA[k];
    const idxs = sec.multi ? state[k] : (state[k] !== null ? [state[k]] : []);
    if(idxs.length) usedLabels.push(sec.label + ":" + idxs.map(i => sec.items[i].type).join("/"));
  });
  const editedText = document.getElementById("edit-textarea").value;
  navigator.clipboard.writeText(editedText).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "コピー済！";
    setTimeout(() => btn.textContent = "コピー", 1800);
    if(APPS_SCRIPT_URL){
      fetch(APPS_SCRIPT_URL, {
        method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          coach: coach,
          templates: usedLabels.join(" | "),
          timestamp: new Date().toLocaleString("ja-JP")
        })
      }).catch(()=>{});
    }
  });
}

function resetAll(){
  SEC_ORDER.forEach(k => {
    state[k] = DATA[k].multi ? [] : null;
  });
  SEC_ORDER.forEach(k => { renderTemplates(k); updateCounter(k); });
  updatePreview(); updateChecklist(); updateDots();
}

buildUI();
</script>
